<!DOCTYPE html>
<html>
<head>
    <title>R Bomma</title>

    <style>
        * {
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
            color: white;
        }

        header {
            background: #e50914;
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 32px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
        }

        nav a:hover {
            color: yellow;
        }

        .hero {
            text-align: center;
            padding: 70px 20px;
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.8)), url("movie.jpg");
            background-size: cover;
            background-position: center;
        }

        .hero h2 {
            font-size: 42px;
        }

        .stylish-title {
            display: inline-block;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: 56px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #fff;
            background: linear-gradient(90deg, #f9b700, #ff3d71, #8b5cff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 25px rgba(255, 61, 113, 0.35);
            position: relative;
            margin-bottom: 10px;
        }

        .stylish-title::after {
            content: '';
            display: block;
            width: 120px;
            height: 4px;
            background: rgba(255, 61, 113, 0.8);
            margin: 14px auto 0;
            border-radius: 999px;
            box-shadow: 0 0 18px rgba(255, 61, 113, 0.35);
        }

        .container {
            padding: 30px;
            text-align: center;
        }

        .search-box {
            background: #1f1f1f;
            padding: 20px;
            border-radius: 15px;
            display: inline-block;
        }

        .search-box input#searchBox {
            width: 100%;
            max-width: 340px;
            background: rgba(255,255,255,0.08);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.22);
            box-shadow: inset 0 0 12px rgba(0, 0, 0, 0.3);
            font-size: 16px;
            font-weight: 600;
            letter-spacing: 0.03em;
        }

        .search-box input#searchBox::placeholder {
            color: #ffd700;
            opacity: 0.9;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 0.12em;
        }

        .search-box select {
            background: rgba(255,255,255,0.08);
            color: #fff;
            border: 1px solid rgba(255,255,255,0.18);
            box-shadow: inset 0 0 12px rgba(0, 0, 0, 0.25);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            transition: border-color 0.2s ease;
        }

        .search-box select:hover,
        .search-box select:focus {
            border-color: #ffd700;
            color: #fff;
        }

        .search-box select option {
            background: #1f1f1f;
            color: #fff;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .movie-card {
            cursor: pointer;
        }

        .movie-card:hover {
            transform: translateY(-6px);
        }

        .card button {
            cursor: pointer;
        }

        input, select, button {
            padding: 13px;
            margin: 8px;
            border-radius: 8px;
            border: none;
            outline: none;
            font-size: 15px;
        }

        input, select {
            width: 220px;
        }

        button {
            background: #e50914;
            color: white;
            cursor: pointer;
            font-weight: bold;
        }

        button:hover {
            background: #b20710;
            transform: scale(1.05);
        }

        .reset-btn {
            background: #444;
        }

        .movies {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 25px;
            margin-top: 30px;
        }

        .card {
            background: #222;
            padding: 15px;
            border-radius: 15px;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-8px);
            box-shadow: 0 0 20px rgba(229, 9, 20, 0.6);
        }

        .card img {
            width: 100%;
            height: 310px;
            object-fit: cover;
            border-radius: 12px;
        }

        .genre {
            background: #e50914;
            padding: 5px 10px;
            border-radius: 20px;
            display: inline-block;
            text-transform: capitalize;
        }

        .rating {
            color: gold;
            font-size: 18px;
        }

        section {
            padding: 40px 20px;
            text-align: center;
        }

        .watchlist-box {
            background: #222;
            max-width: 600px;
            margin: auto;
            padding: 20px;
            border-radius: 15px;
        }

        #watchlist li {
            list-style: none;
            padding: 10px;
            margin: 8px;
            background: #333;
            border-radius: 8px;
        }

        footer {
            background: #000;
            text-align: center;
            padding: 18px;
            color: #aaa;
        }

        @media(max-width: 600px) {
            header {
                flex-direction: column;
            }

            nav {
                margin-top: 10px;
            }

            nav a {
                display: inline-block;
                margin: 8px;
            }

            .hero h2 {
                font-size: 30px;
            }

            input, select {
                width: 90%;
            }
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 12px;
            height: 12px;
        }

        ::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.05);
        }

        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #e50914, #ffb347);
            border-radius: 999px;
            border: 3px solid rgba(255,255,255,0.1);
        }

        ::-webkit-scrollbar-thumb:hover {
            background: linear-gradient(180deg, #ff3d71, #ffd54f);
        }

        ::-webkit-scrollbar-corner {
            background: transparent;
        }
    </style>
</head>

<body>

<header>
    <h1>🎬 R Bomma</h1>
    <nav>
        <a href="#home">Home</a>
        <a href="#movies">Movies</a>
        <a href="#genres">Genres</a>
        <a href="#watch">Watchlist</a>
        <a href="#contact">Contact</a>
    </nav>
</header>

<section class="hero" id="home">
    <h2 class="stylish-title">Telugu Movies</h2>
    <p>Search and discover your favorite Telugu movies by genre.</p>
    <button onclick="goToMovies()">Explore Movies</button>
</section>

<footer>
    <p>© 2026 R Bomma | Telugu Movie Recommendation System</p>
</footer>

<script>
function goToMovies() {
    window.location.href = 'demo4-page2.html';
}
</script>

</body>
</html>
