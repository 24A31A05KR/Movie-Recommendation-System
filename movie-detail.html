<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Movie Review</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
            color: white;
            min-height: 100vh;
        }

        header {
            background: #e50914;
            padding: 18px 40px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 30px;
        }

        .review-container {
            max-width: 900px;
            margin: 40px auto;
            padding: 30px;
            background: rgba(17, 17, 17, 0.95);
            border-radius: 20px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.6);
        }

        .review-header {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 20px;
            justify-content: center;
        }

        .review-header img {
            width: 260px;
            height: 360px;
            object-fit: cover;
            border-radius: 18px;
            border: 2px solid rgba(255, 255, 255, 0.14);
        }

        .review-details {
            flex: 1;
            min-width: 260px;
        }

        .review-details h2 {
            margin: 0 0 12px;
            font-size: 36px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .review-details p.rating {
            margin: 0 0 16px;
            font-size: 18px;
            color: #ffd700;
        }

        .review-body {
            line-height: 1.8;
            font-size: 18px;
            letter-spacing: 0.01em;
            margin-top: 20px;
        }

        .review-body span {
            display: block;
            margin-bottom: 14px;
        }

        .actions {
            text-align: center;
            margin-top: 28px;
        }

        .actions button {
            padding: 14px 26px;
            border: none;
            border-radius: 12px;
            background: #e50914;
            color: white;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .actions button:hover {
            background: #ff3d71;
            transform: translateY(-2px);
        }

        .message {
            text-align: center;
            font-size: 20px;
            margin-top: 20px;
            color: #ccc;
        }

        @media(max-width: 700px) {
            .review-header {
                flex-direction: column;
            }

            .review-header img {
                width: 100%;
                height: auto;
            }
        }
    </style>
</head>
<body>
<header>
    <h1>Movie Review</h1>
</header>
<div class="review-container">
    <div class="review-header">
        <img id="reviewImage" src="" alt="Movie poster">
        <div class="review-details">
            <h2 id="reviewTitle">Loading...</h2>
            <p class="rating" id="reviewRating"></p>
            <div class="review-body" id="reviewBody"></div>
        </div>
    </div>
    <div class="actions">
        <button onclick="goBack()">Back to Movies</button>
    </div>
    <div class="message" id="errorMessage"></div>
</div>

    function getQueryParam(name) {
        const params = new URLSearchParams(window.location.search);
        return params.get(name);
    }

    function renderReview() {
        const movieName = getQueryParam('movie');
        const review = reviews[movieName];

        if (!movieName || !review) {
            document.getElementById('reviewTitle').innerText = 'Movie review not found';
            document.getElementById('reviewRating').innerText = '';
            document.getElementById('reviewImage').style.display = 'none';
            document.getElementById('reviewBody').innerHTML = '';
            document.getElementById('errorMessage').innerText = 'Please return to the movie list and select a valid movie.';
            return;
        }

        document.getElementById('reviewTitle').innerText = movieName;
        document.getElementById('reviewRating').innerText = review.rating;
        document.getElementById('reviewImage').src = review.image;

        const body = document.getElementById('reviewBody');
        body.innerHTML = review.text.map(line => `<span>${line}</span>`).join('');
    }

    function goBack() {
        window.location.href = 'demo4.html';
    }

    renderReview();
