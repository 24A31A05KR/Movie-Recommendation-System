<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>R Bomma - Contact</title>
    <style>
        * {
            box-sizing: border-box;
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #0f0f0f, #1c1c1c);
            color: white;
            min-height: 100vh;
        }

        header {
            background: #e50914;
            padding: 18px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
            font-size: 32px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-left: 20px;
            font-weight: bold;
        }

        nav a:hover {
            color: yellow;
        }

        .contact-section {
            max-width: 700px;
            margin: 60px auto;
            padding: 40px 30px;
            background: rgba(17, 17, 17, 0.95);
            border-radius: 24px;
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .contact-section h2 {
            margin-bottom: 18px;
            font-size: 32px;
        }

        .contact-section p {
            margin: 12px 0;
            font-size: 18px;
            line-height: 1.7;
        }

        .contact-section .info-box {
            margin-top: 30px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 18px;
            text-align: left;
        }

        .info-card {
            background: #222;
            border-radius: 18px;
            padding: 22px;
        }

        .info-card h3 {
            margin-top: 0;
            color: #ffd700;
        }

        .info-card p {
            margin: 8px 0 0;
        }

        footer {
            background: #000;
            padding: 18px;
            text-align: center;
            color: #aaa;
        }

        @media(max-width: 600px) {
            header {
                flex-direction: column;
                gap: 12px;
            }

            nav a {
                margin-left: 0;
            }
        }
    </style>
</head>
<body>
<header>
    <h1>🎬 R Bomma</h1>
    <nav>
        <a href="demo4.html">Home</a>
        <a href="demo4-page2.html">Movies</a>
        <a href="demo4-genre.html">Genres</a>
        <a href="demo4-contact.html">Contact</a>
    </nav>
</header>

<div class="contact-section">
    <h2>Contact Us</h2>
    <p>Have a question about Telugu movies, watchlists, or recommendations? Send us a message anytime.</p>
    <div class="info-box">
        <div class="info-card">
            <h3>Email</h3>
            <p>rbomma@gmail.com</p>
        </div>
        <div class="info-card">
            <h3>Phone</h3>
            <p>+91 9876543210</p>
        </div>
        <div class="info-card">
            <h3>Location</h3>
            <p>Andhra Pradesh, India</p>
        </div>
    </div>
</div>

<footer>
    <p>© 2026 R Bomma | Telugu Movie Recommendation System</p>
</footer>
</body>
</html>
